name: Run dbt Pipeline

on:
  workflow_dispatch: # Cho phép ông bấm nút chạy tay bất cứ lúc nào
  push:
    branches: [ main ] # Tự chạy mỗi khi ông update code

jobs:
  run_dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install dbt-postgres # Hoặc adapter ông đang dùng

      - name: Run dbt
        working-directory: ./dbt_project  # Thêm dòng này để dẫn đường cho GitHub vào đúng thư mục
        run: dbt run --profiles-dir .
