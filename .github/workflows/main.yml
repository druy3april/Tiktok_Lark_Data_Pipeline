name: Full Tiktok Lark Data Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    # Chạy vào 12:00 UTC (19h VN) và 23:00 UTC (6h sáng VN hôm sau)
    - cron: '0 12,23 * * *'

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas sqlalchemy psycopg2-binary dbt-postgres python-dotenv

      - name: BƯỚC 1 - Chạy script nạp Target
        env:
          LARK_API_TOKEN: ${{ secrets.LARK_API_TOKEN }}
          TABLE_ID_TARGET: ${{ secrets.TABLE_ID_TARGET }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python find_target.py

      - name: BƯỚC 2 - Chạy script Extract chính
        env:
          LARK_API_TOKEN: ${{ secrets.LARK_API_TOKEN }}
          TABLE_ID_EXTRACT: ${{ secrets.TABLE_ID_EXTRACT }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python airflow/dags/extract_lark.py

      - name: BƯỚC 2.5 - Đảm bảo schema (tạo cột/bảng mới cho dbt)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python ensure_schema.py

      - name: BƯỚC 3 - Chạy dbt Transform
        working-directory: ./dbt_project
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: dbt run --profiles-dir .
